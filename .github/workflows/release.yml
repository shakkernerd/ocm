name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify release tag
    runs-on: ubuntu-latest
    outputs:
      commit: ${{ steps.verify.outputs.commit }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: false
      - name: Verify signed tag and package version
        id: verify
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          verified_commit="$(
            ./scripts/verify-release-tag.sh \
              --repo "$RELEASE_REPO" \
              --tag "$RELEASE_TAG"
          )"
          printf 'commit=%s\n' "$verified_commit" >>"$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.verify.outputs.commit }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build release binary
        run: cargo build --locked --release --target "${{ matrix.target }}"
      - name: Package release archive
        run: |
          ./scripts/package-release.sh \
            --target "${{ matrix.target }}" \
            --binary "./target/${{ matrix.target }}/release/ocm" \
            --output-dir ./dist
      - name: Stage release archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: ./dist/*.tar.gz
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish complete release
    needs:
      - verify
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.verify.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false
      - name: Download release archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: ./dist
          merge-multiple: true
      - name: Stage versioned installer
        run: cp ./install.sh ./dist/install.sh
      - name: Publish verified release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ needs.verify.outputs.commit }}
          RELEASE_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          ./scripts/verify-release-tag.sh \
            --repo "$RELEASE_REPO" \
            --tag "$RELEASE_TAG" \
            --commit "$RELEASE_COMMIT" \
            >/dev/null
          ./scripts/publish-release.sh \
            --repo "$RELEASE_REPO" \
            --tag "$RELEASE_TAG" \
            --asset-dir ./dist
