name: Release

on:
  repository_dispatch:
    types:
      - release

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.client_payload.tag }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify release tag
    runs-on: ubuntu-latest
    outputs:
      commit: ${{ steps.verify.outputs.commit }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Verify signed tag and package version
        id: verify
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.client_payload.tag }}
        run: |
          verified_commit="$(
            ./scripts/verify-release-tag.sh \
              --repo "$RELEASE_REPO" \
              --tag "$RELEASE_TAG"
          )"
          printf 'commit=%s\n' "$verified_commit" >>"$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.verify.outputs.commit }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
      - name: Build release binary
        run: cargo build --locked --release --target "${{ matrix.target }}"
      - name: Package release archive
        run: |
          ./scripts/package-release.sh \
            --target "${{ matrix.target }}" \
            --binary "./target/${{ matrix.target }}/release/ocm" \
            --output-dir ./dist
      - name: Stage release archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-${{ matrix.target }}
          path: ./dist/*.tar.gz
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish complete release
    needs:
      - verify
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.verify.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false
      - name: Download release archives
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-*
          path: ./dist
          merge-multiple: true
      - name: Stage versioned installer
        run: cp ./install.sh ./dist/install.sh
      - name: Publish verified release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ needs.verify.outputs.commit }}
          RELEASE_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.client_payload.tag }}
        run: |
          ./scripts/verify-release-tag.sh \
            --repo "$RELEASE_REPO" \
            --tag "$RELEASE_TAG" \
            --commit "$RELEASE_COMMIT" \
            >/dev/null
          ./scripts/publish-release.sh \
            --repo "$RELEASE_REPO" \
            --tag "$RELEASE_TAG" \
            --asset-dir ./dist
